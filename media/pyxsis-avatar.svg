<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" width="300" height="320">
  <!-- Yellow background -->
  <rect width="300" height="320" fill="#FFD700" rx="15"/>

  <!-- Body -->
  <ellipse cx="150" cy="210" rx="70" ry="80" fill="#3d2b0a"/>
  
  <!-- White chest -->
  <ellipse cx="150" cy="220" rx="40" ry="55" fill="#f5f5f0"/>
  
  <!-- Left wing -->
  <path d="M80,180 Q20,140 10,100 Q40,120 60,150 Q30,110 35,70 Q65,100 75,140 Q55,90 70,55 Q95,90 95,135 Q85,100 100,75 Q115,110 105,155 Z" fill="#3d2b0a"/>
  <!-- Right wing -->
  <path d="M220,180 Q280,140 290,100 Q260,120 240,150 Q270,110 265,70 Q235,100 225,140 Q245,90 230,55 Q205,90 205,135 Q215,100 200,75 Q185,110 195,155 Z" fill="#3d2b0a"/>

  <!-- Neck -->
  <ellipse cx="150" cy="145" rx="35" ry="30" fill="#f5f5f0"/>

  <!-- Head -->
  <ellipse cx="150" cy="105" rx="42" ry="40" fill="#f5f5f0"/>

  <!-- Left eye -->
  <circle cx="133" cy="100" r="12" fill="#8B6914"/>
  <circle cx="133" cy="100" r="8" fill="#4a3500"/>
  <circle cx="133" cy="100" r="5" fill="#1a0a00"/>
  <circle cx="131" cy="98" r="2" fill="white"/>

  <!-- Right eye -->
  <circle cx="167" cy="100" r="12" fill="#8B6914"/>
  <circle cx="167" cy="100" r="8" fill="#4a3500"/>
  <circle cx="167" cy="100" r="5" fill="#1a0a00"/>
  <circle cx="165" cy="98" r="2" fill="white"/>

  <!-- Beak -->
  <path d="M145,112 Q150,130 155,112 Q160,125 150,138 Q140,125 145,112Z" fill="#E8A020"/>
  <line x1="145" y1="118" x2="155" y2="118" stroke="#8B6914" stroke-width="1.5"/>

  <!-- Talons -->
  <line x1="125" y1="288" x2="108" y2="308" stroke="#8B6914" stroke-width="3"/>
  <line x1="130" y1="290" x2="120" y2="312" stroke="#8B6914" stroke-width="3"/>
  <line x1="135" y1="290" x2="132" y2="314" stroke="#8B6914" stroke-width="3"/>
  <line x1="140" y1="290" x2="145" y2="314" stroke="#8B6914" stroke-width="3"/>
  <line x1="165" y1="288" x2="182" y2="308" stroke="#8B6914" stroke-width="3"/>
  <line x1="160" y1="290" x2="170" y2="312" stroke="#8B6914" stroke-width="3"/>
  <line x1="155" y1="290" x2="158" y2="314" stroke="#8B6914" stroke-width="3"/>

  <!-- Name -->
  <text x="150" y="315" font-size="13" fill="#3d2b0a" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" letter-spacing="3">PYXSIS</text>
</svg>
